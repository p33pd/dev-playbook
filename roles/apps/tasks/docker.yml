- name: Install Docker (Fedora repos)
  tags:
    - apps
    - docker
  block:
    - name: Install Docker packages
      become: true
      ansible.builtin.dnf:
        name:
          - docker-cli
          - containerd
          - docker-compose
        state: present

    - name: Add current user to docker group
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: true
